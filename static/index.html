<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MLB Live Board</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="bg-glow" aria-hidden="true"></div>

  <header class="top">
    <div class="brand">
      <div class="logo-mark" aria-hidden="true">◆</div>
      <div>
        <h1>MLB Live Board</h1>
        <p class="subtitle">Scores · Starting pitcher strikeouts</p>
      </div>
    </div>
    <div class="controls">
      <label class="date-label">
        <span>Date</span>
        <input type="date" id="dateInput" />
      </label>
      <button type="button" id="refreshBtn" class="btn" title="Refresh now">Refresh</button>
      <div class="status-pill" id="statusPill">
        <span class="dot" id="liveDot"></span>
        <span id="statusText">Connecting…</span>
      </div>
    </div>
  </header>

  <section class="filters" aria-label="Filters">
    <button type="button" class="chip active" data-filter="all">All</button>
    <button type="button" class="chip" data-filter="Live">Live</button>
    <button type="button" class="chip" data-filter="Preview">Upcoming</button>
    <button type="button" class="chip" data-filter="Final">Final</button>
  </section>

  <main>
    <div id="summary" class="summary"></div>
    <div id="board" class="board" aria-live="polite"></div>
    <div id="empty" class="empty hidden">No games for this date.</div>
    <div id="error" class="error hidden"></div>
  </main>

  <footer>
    Data from MLB Stats API · Times in PT · Works on any network · Auto-refreshes every 20s
  </footer>

  <script src="app.js"></script>
</body>
</html>
